<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DebateGPT Japan-Adaptive</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --ink: #1d2430;
      --muted: #667085;
      --line: #d6dde8;
      --panel: #fff;
      --accent: #0f766e;
      --accent-ink: #fff;
      --soft: #e8f0f2;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.55;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto 48px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }
    h1 {
      grid-column: 1 / -1;
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    fieldset {
      border: 1px solid var(--line);
      border-radius: 6px;
      margin: 12px 0 0;
      padding: 10px 11px 12px;
    }
    legend {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 0 4px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    textarea {
      min-height: 112px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
    }
    .check input { width: auto; }
    .choice-grid {
      display: grid;
      gap: 8px;
    }
    .choice-grid .check {
      margin: 0;
      align-items: flex-start;
      font-weight: 500;
      color: var(--ink);
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: var(--accent-ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: var(--soft);
      color: #1d3a44;
    }
    button:disabled {
      opacity: .55;
      cursor: wait;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .profile { display: none; }
    .profile.enabled { display: block; }
    .transcript {
      display: grid;
      gap: 12px;
    }
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
      white-space: pre-wrap;
    }
    .message strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    .status {
      margin-top: 12px;
      color: var(--muted);
      min-height: 24px;
    }
    .error {
      color: var(--danger);
      font-weight: 700;
    }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>DebateGPT Japan-Adaptive</h1>

    <section>
      <h2>設定</h2>
      <label for="accessToken">アクセスキー</label>
      <input id="accessToken" type="password" autocomplete="off" placeholder="VercelのAPP_ACCESS_TOKEN" />

      <label for="model">モデル</label>
      <select id="model">
        <option value="gpt-5.2" selected>gpt-5.2</option>
        <option value="gpt-5.2-2025-12-11">gpt-5.2-2025-12-11</option>
        <option value="gpt-5-mini">gpt-5-mini</option>
        <option value="gpt-5-nano">gpt-5-nano</option>
        <option value="gpt-4.1">gpt-4.1</option>
      </select>

      <label for="experimentMode">実験モード</label>
      <select id="experimentMode">
        <option value="none">非パーソナライズ</option>
        <option value="japan_adaptive" selected>日本適応型パーソナライズ</option>
        <option value="party_affiliation">政党属性パーソナライズ</option>
      </select>

      <label for="topic">討論テーマ</label>
      <input id="topic" value="日本では選択的夫婦別姓を導入すべきか" />

      <div class="row">
        <div>
          <label for="userSide">あなたの立場</label>
          <select id="userSide">
            <option value="pro">賛成</option>
            <option value="con">反対</option>
          </select>
        </div>
        <div>
          <label for="pre">討論前の同意度</label>
          <select id="pre">
            <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
          </select>
        </div>
      </div>

      <div id="japanProfile" class="profile enabled">
        <label for="primaryValue">最も重視する価値</label>
        <select id="primaryValue">
          <option value="個人の自由・自己決定">個人の自由・自己決定</option>
          <option value="公平性・平等" selected>公平性・平等</option>
          <option value="弱い立場の人の保護・害の回避">弱い立場の人の保護・害の回避</option>
          <option value="社会の安全・安定">社会の安全・安定</option>
          <option value="伝統・秩序・既存制度との整合性">伝統・秩序・既存制度との整合性</option>
          <option value="身近な人・地域社会への配慮">身近な人・地域社会への配慮</option>
          <option value="成果・効率・費用対効果">成果・効率・費用対効果</option>
          <option value="その他">その他</option>
        </select>

        <fieldset>
          <legend>具体的に重視する点</legend>
          <div class="choice-grid">
            <label class="check"><input name="specificValues" type="checkbox" value="個人が自分で選べること" checked />個人が自分で選べること</label>
            <label class="check"><input name="specificValues" type="checkbox" value="制度上の公平性" checked />制度上の公平性</label>
            <label class="check"><input name="specificValues" type="checkbox" value="不利益を受けやすい人への配慮" />不利益を受けやすい人への配慮</label>
            <label class="check"><input name="specificValues" type="checkbox" value="社会的混乱やリスクを避けること" checked />社会的混乱やリスクを避けること</label>
            <label class="check"><input name="specificValues" type="checkbox" value="既存の制度や慣習との整合性" />既存の制度や慣習との整合性</label>
            <label class="check"><input name="specificValues" type="checkbox" value="家族や地域社会への影響" />家族や地域社会への影響</label>
            <label class="check"><input name="specificValues" type="checkbox" value="将来世代への影響" />将来世代への影響</label>
            <label class="check"><input name="specificValues" type="checkbox" value="費用対効果や実現可能性" />費用対効果や実現可能性</label>
          </div>
        </fieldset>

        <label for="valueOther">その他の価値・補足</label>
        <input id="valueOther" placeholder="必要な場合のみ入力" />

        <fieldset>
          <legend>判断するときに重視する根拠</legend>
          <div class="choice-grid">
            <label class="check"><input name="evidencePreference" type="checkbox" value="統計データや実証研究" checked />統計データや実証研究</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="当事者の経験や声" />当事者の経験や声</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="制度の公平性" checked />制度の公平性</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="社会全体への影響" />社会全体への影響</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="経済的コストや便益" />経済的コストや便益</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="専門家の意見" />専門家の意見</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="歴史的経緯や既存制度との整合性" />歴史的経緯や既存制度との整合性</label>
            <label class="check"><input name="evidencePreference" type="checkbox" value="身近な生活への影響" />身近な生活への影響</label>
          </div>
        </fieldset>

        <label for="evidenceOther">その他の判断根拠・補足</label>
        <input id="evidenceOther" placeholder="必要な場合のみ入力" />

        <label for="selfRelevance">争点の自己関連性</label>
        <select id="selfRelevance">
          <option value="1">1. まったく関係がない</option>
          <option value="2">2. あまり関係がない</option>
          <option value="3" selected>3. どちらともいえない</option>
          <option value="4">4. やや関係がある</option>
          <option value="5">5. とても関係がある</option>
        </select>
        <label>懸念している点</label>
        <textarea id="concerns">制度変更による副作用、費用対効果、当事者への実際の影響</textarea>
      </div>

      <div id="partyProfile" class="profile">
        <label for="partySupport">支持政党</label>
        <select id="partySupport">
          <option value="自由民主党">自由民主党</option>
          <option value="立憲民主党">立憲民主党</option>
          <option value="日本維新の会">日本維新の会</option>
          <option value="公明党">公明党</option>
          <option value="国民民主党">国民民主党</option>
          <option value="日本共産党">日本共産党</option>
          <option value="れいわ新選組">れいわ新選組</option>
          <option value="参政党">参政党</option>
          <option value="その他の政党">その他の政党</option>
          <option value="特に支持している政党はない" selected>特に支持している政党はない</option>
          <option value="回答したくない">回答したくない</option>
        </select>

        <label for="partySupportStrength">支持の強さ</label>
        <select id="partySupportStrength">
          <option value="1">1. とても弱い</option>
          <option value="2">2. やや弱い</option>
          <option value="3" selected>3. どちらともいえない</option>
          <option value="4">4. やや強い</option>
          <option value="5">5. とても強い</option>
        </select>

        <label for="politicalInterest">政治関心</label>
        <select id="politicalInterest">
          <option value="1">1. まったく関心がない</option>
          <option value="2">2. あまり関心がない</option>
          <option value="3" selected>3. どちらともいえない</option>
          <option value="4">4. やや関心がある</option>
          <option value="5">5. とても関心がある</option>
        </select>

        <label for="ideology">政治的自己配置</label>
        <select id="ideology">
          <option value="とてもリベラル">とてもリベラル</option>
          <option value="ややリベラル">ややリベラル</option>
          <option value="中間" selected>中間</option>
          <option value="やや保守">やや保守</option>
          <option value="とても保守">とても保守</option>
          <option value="わからない">わからない</option>
        </select>

        <label for="topicAttitude">このテーマへの事前態度</label>
        <select id="topicAttitude">
          <option value="1">1. 強く反対</option>
          <option value="2">2. やや反対</option>
          <option value="3" selected>3. どちらともいえない</option>
          <option value="4">4. やや賛成</option>
          <option value="5">5. 強く賛成</option>
        </select>

        <label for="attitudeStrength">このテーマへの意見の強さ</label>
        <select id="attitudeStrength">
          <option value="1">1. ほとんど意見を持っていない</option>
          <option value="2">2. あまり強い意見ではない</option>
          <option value="3" selected>3. どちらともいえない</option>
          <option value="4">4. やや強い意見を持っている</option>
          <option value="5">5. とても強い意見を持っている</option>
        </select>
      </div>

      <div class="actions">
        <button id="start">AIの冒頭意見を生成</button>
        <button id="save" class="secondary" disabled>サーバー保存</button>
        <button id="history" class="secondary">履歴読込</button>
        <button id="reset" class="secondary">リセット</button>
      </div>
      <div id="status" class="status"></div>
      <div id="historyList" class="transcript"></div>
    </section>

    <section>
      <h2>討論</h2>
      <div id="transcript" class="transcript"></div>

      <label id="inputLabel" for="userText">あなたの入力</label>
      <textarea id="userText" placeholder="ここに文章を入力します"></textarea>

      <div class="actions">
        <button id="next" disabled>次へ</button>
        <button id="download" class="secondary" disabled>ログ保存</button>
      </div>

      <div class="row">
        <div>
          <label for="post">討論後の同意度</label>
          <select id="post">
            <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
          </select>
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      step: "idle",
      messages: [{ role: "system", content: "あなたは日本語で短く討論するAIです。指定された立場を守り、虚偽の断定を避け、1〜2文で簡潔に答えてください。" }],
      userOpening: "",
      userRebuttal: "",
      log: [],
    };

    const $ = (id) => document.getElementById(id);
    const transcript = $("transcript");
    const status = $("status");

    $("accessToken").value = localStorage.getItem("debategptAccessToken") || "";
    $("accessToken").addEventListener("change", () => {
      localStorage.setItem("debategptAccessToken", $("accessToken").value.trim());
    });
    initModeFromUrl();
    $("experimentMode").addEventListener("change", updateModeVisibility);
    $("start").addEventListener("click", startDebate);
    $("next").addEventListener("click", nextStep);
    $("reset").addEventListener("click", () => location.reload());
    $("download").addEventListener("click", downloadLog);
    $("save").addEventListener("click", saveSession);
    $("history").addEventListener("click", loadHistory);

    function userSide() { return $("userSide").value; }
    function aiSide() { return userSide() === "pro" ? "con" : "pro"; }
    function sideLabel(side) { return side === "pro" ? "賛成" : "反対"; }

    async function startDebate() {
      transcript.innerHTML = "";
      state.messages = [{ role: "system", content: "あなたは日本語で短く討論するAIです。指定された立場を守り、虚偽の断定を避け、1〜2文で簡潔に答えてください。" }];
      state.userOpening = "";
      state.userRebuttal = "";
      state.log = [];
      $("post").value = $("pre").value;

      addMessage(
        "設定",
        "モデル: " + $("model").value +
          "\nテーマ: " + $("topic").value +
          "\nあなた: " + sideLabel(userSide()) + " / AI: " + sideLabel(aiSide()) +
          "\n実験モード: " + modeLabel($("experimentMode").value) +
          "\n討論前同意度: " + $("pre").value,
      );
      const aiOpening = await generate("opening");
      addMessage("AI 冒頭意見", aiOpening);
      state.step = "userOpening";
      $("inputLabel").textContent = "あなたの冒頭意見";
      $("userText").value = "";
      $("next").disabled = false;
      $("download").disabled = false;
      $("save").disabled = false;
    }

    async function nextStep() {
      const text = $("userText").value.trim();
      if (!text) return setStatus("入力欄に文章を書いてください。", true);

      if (state.step === "userOpening") {
        state.userOpening = text;
        addMessage("あなたの冒頭意見", text);
        $("userText").value = "";
        const aiRebuttal = await generate("rebuttal");
        addMessage("AI 反論", aiRebuttal);
        state.step = "userRebuttal";
        $("inputLabel").textContent = "あなたの反論";
        return;
      }

      if (state.step === "userRebuttal") {
        state.userRebuttal = text;
        addMessage("あなたの反論", text);
        $("userText").value = "";
        const aiConclusion = await generate("conclusion");
        addMessage("AI 結論", aiConclusion);
        state.step = "userConclusion";
        $("inputLabel").textContent = "あなたの結論";
        return;
      }

      if (state.step === "userConclusion") {
        addMessage("あなたの結論", text);
        addMessage("結果", "討論前同意度: " + $("pre").value + "\n討論後同意度: " + $("post").value);
        $("next").disabled = true;
        $("userText").value = "";
        setStatus("完了しました。");
      }
    }

    async function generate(stage) {
      setBusy(true);
      setStatus("生成中...");
      try {
        const promptResponse = await fetch("/api/prompt", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            stage,
            topic: $("topic").value,
            aiSide: aiSide(),
            userSide: userSide(),
            userOpening: state.userOpening,
            userRebuttal: state.userRebuttal,
            profile: profile(),
          }),
        });
        const { prompt } = await promptResponse.json();
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-app-access-token": $("accessToken").value.trim(),
          },
          body: JSON.stringify({
            model: $("model").value,
            messages: state.messages,
            prompt,
          }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "生成に失敗しました。");
        state.messages.push({ role: "user", content: prompt });
        state.messages.push({ role: "assistant", content: data.content });
        setStatus("");
        return data.content;
      } catch (error) {
        setStatus(error.message, true);
        throw error;
      } finally {
        setBusy(false);
      }
    }

    function profile() {
      const mode = $("experimentMode").value;
      const selfRelevance = $("selfRelevance");
      const topicAttitude = $("topicAttitude");
      const attitudeStrength = $("attitudeStrength");
      const partySupportStrength = $("partySupportStrength");
      const politicalInterest = $("politicalInterest");
      return {
        enabled: mode !== "none",
        experimentMode: mode,
        primaryValue: $("primaryValue").value,
        specificValues: checkedValues("specificValues"),
        valueOther: $("valueOther").value,
        evidencePreference: checkedValues("evidencePreference"),
        evidenceOther: $("evidenceOther").value,
        selfRelevanceScore: selfRelevance.value,
        selfRelevanceLabel: selfRelevance.options[selfRelevance.selectedIndex].text,
        concerns: $("concerns").value,
        partySupport: $("partySupport").value,
        partySupportStrengthScore: partySupportStrength.value,
        partySupportStrengthLabel: partySupportStrength.options[partySupportStrength.selectedIndex].text,
        politicalInterestScore: politicalInterest.value,
        politicalInterestLabel: politicalInterest.options[politicalInterest.selectedIndex].text,
        ideology: $("ideology").value,
        topicAttitudeScore: topicAttitude.value,
        topicAttitudeLabel: topicAttitude.options[topicAttitude.selectedIndex].text,
        attitudeStrengthScore: attitudeStrength.value,
        attitudeStrengthLabel: attitudeStrength.options[attitudeStrength.selectedIndex].text,
      };
    }

    function initModeFromUrl() {
      const mode = new URLSearchParams(location.search).get("mode");
      if (["none", "japan_adaptive", "party_affiliation"].includes(mode)) {
        $("experimentMode").value = mode;
      }
      updateModeVisibility();
    }

    function updateModeVisibility() {
      const mode = $("experimentMode").value;
      $("japanProfile").classList.toggle("enabled", mode === "japan_adaptive");
      $("partyProfile").classList.toggle("enabled", mode === "party_affiliation");
    }

    function modeLabel(mode) {
      return {
        none: "非パーソナライズ",
        japan_adaptive: "日本適応型パーソナライズ",
        party_affiliation: "政党属性パーソナライズ",
      }[mode] || mode;
    }

    function checkedValues(name) {
      return Array.from(document.querySelectorAll('input[name="' + name + '"]:checked')).map((input) => input.value);
    }

    function addMessage(title, text) {
      renderMessage(title, text);
      state.log.push({ title, text, at: new Date().toISOString() });
    }

    function renderMessage(title, text) {
      const div = document.createElement("div");
      div.className = "message";
      div.innerHTML = "<strong></strong><span></span>";
      div.querySelector("strong").textContent = title;
      div.querySelector("span").textContent = text;
      transcript.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function downloadLog() {
      const blob = new Blob([JSON.stringify(state.log, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "debategpt-log.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    async function saveSession() {
      setStatus("保存中...");
      try {
        const currentProfile = profile();
        const response = await fetch("/api/store", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-app-access-token": $("accessToken").value.trim(),
          },
          body: JSON.stringify({
            topic: $("topic").value,
            model: $("model").value,
            userSide: userSide(),
            aiSide: aiSide(),
            personalized: currentProfile.enabled,
            profile: currentProfile,
            preAgreement: $("pre").value,
            postAgreement: $("post").value,
            log: state.log,
          }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "保存に失敗しました。");
        setStatus("保存しました: session #" + data.session.id);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadHistory() {
      const list = $("historyList");
      list.innerHTML = "";
      setStatus("履歴読込中...");
      try {
        const response = await fetch("/api/store", {
          method: "GET",
          headers: { "x-app-access-token": $("accessToken").value.trim() },
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "履歴の読込に失敗しました。");
        if (!data.sessions.length) list.textContent = "保存済み履歴はありません。";
        for (const session of data.sessions) {
          const item = document.createElement("button");
          item.className = "secondary";
          item.textContent = "#" + session.id + " " + new Date(session.created_at).toLocaleString() + " / " + session.topic;
          item.addEventListener("click", () => loadSession(session.id));
          list.appendChild(item);
        }
        setStatus("履歴を読み込みました。");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadSession(id) {
      setStatus("セッション読込中...");
      try {
        const response = await fetch("/api/session?id=" + encodeURIComponent(id), {
          headers: { "x-app-access-token": $("accessToken").value.trim() },
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "セッションの読込に失敗しました。");
        transcript.innerHTML = "";
        state.log = data.session.log || [];
        for (const entry of state.log) renderMessage(entry.title, entry.text);
        $("topic").value = data.session.topic || $("topic").value;
        $("model").value = data.session.model || $("model").value;
        $("userSide").value = data.session.user_side || $("userSide").value;
        $("pre").value = data.session.pre_agreement || $("pre").value;
        $("post").value = data.session.post_agreement || $("post").value;
        applyLoadedProfile(data.session.profile);
        setStatus("セッション #" + id + " を表示しました。");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    function applyLoadedProfile(loadedProfile) {
      if (!loadedProfile) return;
      if (loadedProfile.experimentMode) $("experimentMode").value = loadedProfile.experimentMode;
      if (loadedProfile.primaryValue) $("primaryValue").value = loadedProfile.primaryValue;
      if (loadedProfile.valueOther) $("valueOther").value = loadedProfile.valueOther;
      if (loadedProfile.evidenceOther) $("evidenceOther").value = loadedProfile.evidenceOther;
      if (loadedProfile.selfRelevanceScore) $("selfRelevance").value = loadedProfile.selfRelevanceScore;
      if (loadedProfile.concerns) $("concerns").value = loadedProfile.concerns;
      if (loadedProfile.partySupport) $("partySupport").value = loadedProfile.partySupport;
      if (loadedProfile.partySupportStrengthScore) $("partySupportStrength").value = loadedProfile.partySupportStrengthScore;
      if (loadedProfile.politicalInterestScore) $("politicalInterest").value = loadedProfile.politicalInterestScore;
      if (loadedProfile.ideology) $("ideology").value = loadedProfile.ideology;
      if (loadedProfile.topicAttitudeScore) $("topicAttitude").value = loadedProfile.topicAttitudeScore;
      if (loadedProfile.attitudeStrengthScore) $("attitudeStrength").value = loadedProfile.attitudeStrengthScore;
      setCheckedValues("specificValues", loadedProfile.specificValues || []);
      setCheckedValues("evidencePreference", loadedProfile.evidencePreference || []);
      updateModeVisibility();
    }

    function setCheckedValues(name, values) {
      const selected = new Set(values);
      for (const input of document.querySelectorAll('input[name="' + name + '"]')) {
        input.checked = selected.has(input.value);
      }
    }

    function setBusy(busy) {
      $("start").disabled = busy;
      $("next").disabled = busy || state.step === "idle";
    }

    function setStatus(text, isError = false) {
      status.textContent = text;
      status.className = "status" + (isError ? " error" : "");
    }
  </script>
</body>
</html>
